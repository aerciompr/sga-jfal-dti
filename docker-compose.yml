version: '3.8'

services:
  web:
    build: .
    container_name: sga-web
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=secret
      - DB_NAME=justica_senhas
      - SYS_NAME=Justiça Federal
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    container_name: sga-db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=justica_senhas
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:
